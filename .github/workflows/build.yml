name: Build PS3 PKG

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3

      - name: Create dummy PKG (WORKING TEST)
        run: |
          mkdir output
          echo "PS3 APP PLACEHOLDER" > output/app.txt
          zip -r ps3-stream.pkg output

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: ps3-pkg
          path: "*.pkg"
