name: Build PS3 PKG

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
  run: |
    sudo apt update
    sudo apt install -y \
      git build-essential python3 python-is-python3 python-dev-is-python3 \
      autoconf automake bison flex texinfo libncurses5-dev patch subversion wget \
      zlib1g-dev libelf-dev libtool libtool-bin bzip2 libgmp3-dev pkg-config \
      g++ libssl-dev clang  

      - name: Install PS3 toolchain
        run: |
          git clone https://github.com/ps3dev/ps3toolchain.git
          cd ps3toolchain
          ./toolchain.sh

      - name: Set environment
        run: |
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

      - name: Build project
        run: |
          make
          make pkg

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: ps3-pkg
          path: "*.pkg"
